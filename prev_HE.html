<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prédictions de Hauteur d'Eau</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script> <!-- Updated Plotly.js version -->
<style>
body {{
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background-color: #f0f0f0;
  height: 100%;
}}
/* Removed flexbox centering */
html {{
  height: 100%;
}}
#waterHeightPlot {{
  width: 100%;
  height: 100vh;
  border: none;
  box-shadow: none;
  background-color: white;
}}
/* Removed border and shadow for full immersion */
</style>
</head>
<body>
    <div id="waterHeightPlot"></div>
    <script>
        console.log("Plotly script started.");
        var predictionsData = {predictions_json};
        var actualData = {actual_json}; // Historical actual data for context

        console.log("predictionsData:", predictionsData);
        console.log("actualData:", actualData);

        var plotData = [];

        var tracePredictions = {{
            x: predictionsData.map(d => d.Date),
            y: predictionsData.map(d => d["Hauteur d'eau prédite (mm)"]),
            mode: 'lines+markers',
            name: "Prédiction Future",
            line: {{ "color": "red" }},
            marker: {{ "size": 4 }}
        }};
        plotData.push(tracePredictions);

        var layout = {{
            "title": "<b>Prévisions de hauteur d'Eau pour les 3 prochains jours</b>",
            "xaxis": {{ "title": "Date et Heure (Europe/Paris)", "type": "date" }},
            "yaxis": {{ "title": "Hauteur d'eau (mm)" }},
            "hovermode": "closest",
            "showlegend": false // Disabled legend as only predictions are shown
        }};

        try {{
            Plotly.newPlot('waterHeightPlot', plotData, layout);
            console.log("Plotly.newPlot executed successfully.");
        }} catch (e) {{
            console.error("Error rendering Plotly chart:", e);
        }}
    </script>
</body>
</html>
