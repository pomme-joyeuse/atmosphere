<html lang="fr">
<head>
<meta charset="utf-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, Arial, sans-serif;
}

#chart-container {
  width: 100vw;
  height: calc(100vh - 60px);
}
  
h2 {
  text-align: center;
  margin-bottom: 5px;
  color: #333;
  font-size: 18px;
  font-weight: bold;
}
</style>
<title> Morsang-sur-Orge </title>
</head>

<body>
  
<h2> Précipitations prévues dans les 3 prochains jours </h2>

<div id="chart-container">
  <canvas id="rainChart"></canvas>
</div>

<script>

const url =
  "https://api.open-meteo.com/v1/forecast?latitude=48.668037&longitude=2.344680&hourly=precipitation&timezone=Europe/Paris";

fetch(url)
  .then(r => r.json())
  .then(j => {

    const times = j.hourly.time;
    const precipitation = j.hourly.precipitation;

    const labels = [];
    const values = [];

    const now = new Date();
    const startDate = new Date(now.getTime() + 60 * 60 * 1000);

    const endDate = new Date(now);
    endDate.setDate(endDate.getDate() + 4);

    for(let i = 0; i < times.length; i++) {
      const dt = new Date(times[i]);
      if(dt >= startDate && dt <= endDate) {
        labels.push(dt);
        values.push(precipitation[i] ?? 0);
      }
    }

    new Chart(document.getElementById("rainChart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Précipitations (mm)",
          data: values,
          backgroundColor: "rgba(54, 162, 235, 0.7)",
          borderColor: "rgba(54, 162, 235, 1)",
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            display: true
          },
          tooltip: {
            callbacks: {
              title: function(context) {
                const dt = new Date(labels[context[0].dataIndex]);
                return dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }) + " à " + dt.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
              }
            }
          }
        },
        scales: {
          x: {
            // Désactive les lignes de grille verticales
            grid: {
              display: false
            },
            ticks: {
              maxRotation: 0,
              minRotation: 0,
              callback: function(val, index) {
                const dt = labels[index];
                const hour = dt.getHours();
                
                if (hour % 4 === 0) {
                  const dayString = dt.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
                  const timeString = dt.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
                  
                  const previousDisplayedIndex = index - 4;
                  const isNewDay = previousDisplayedIndex < 0 || labels[previousDisplayedIndex].getDate() !== dt.getDate();

                  if (isNewDay) {
                    return [dayString, timeString];
                  } else {
                    return timeString;
                  }
                }
                return null;
              }
            }
          },
          y: {
            beginAtZero: true,
            // Désactive les lignes de grille horizontales
            grid: {
              display: false
            },
            title: {
              display: false,
              text: "mm"
            }
          }
        }
      }
    });

  })
  .catch(e => {
    document.body.innerHTML += "<p>Erreur : " + e.message + "</p>";
  });

</script>

</body>
</html>
