<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prévisions Météo Beauvais</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 900px; /* Limite strictement la largeur à 900 px */
            margin: 0 auto; /* Centre le bloc sur l'écran */
            box-sizing: border-box;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h2 { margin: 0; color: #333; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .table-container {
            max-height: 750px; /* Hauteur confortable pour le défilement */
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            position: sticky;
            top: 0;
            color: #555;
            z-index: 2;
        }
        .jour-header {
            background-color: #e9ecef;
            font-weight: bold;
            color: #495057;
            font-size: 16px;
        }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h2 id="titre-vue">📋 Prévisions Météo Beauvais</h2>
        <button id="btn-vue" onclick="basculerVue()">Passer au mode 7 jours (Toutes les 3h)</button>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Heure / Tranche</th>
                    <th>Temps attendu</th>
                    <th class="text-center">Température</th>
                    <th class="text-center">Pluie (%) / Quantité</th>
                    <th class="text-center">Vent</th>
                </tr>
            </thead>
            <tbody id="tableau-meteo">
                <tr>
                    <td colspan="5" class="text-center">Chargement des données...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
let donneesMeteo = null;
let mode3JoursHoraire = true;

function interpreterCodeMeteo(code) {
    if (code === 0) return "☀️ Ciel dégagé";
    if (code >= 1 && code <= 3) return "🌤️ Éclaircies / Nuageux";
    if (code >= 45 && code <= 48) return "🌫️ Brouillard";
    if (code >= 51 && code <= 55) return "🌧️ Bruine légère";
    if (code >= 61 && code <= 65) return "🌧️ Pluie";
    if (code >= 71 && code <= 77) return "❄️ Neige";
    if (code >= 80 && code <= 82) return "🌦️ Averses de pluie";
    if (code >= 95 && code <= 99) return "⛈️ Orage";
    return "❓ Inconnu";
}

// Chargement direct avec les coordonnées géographiques de Beauvais
function demarrer() {
    chargerMeteo(49.4317, 2.0833);
}

async function chargerMeteo(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,precipitation,wind_speed_10m,weather_code&timezone=auto`;
    try {
        const response = await fetch(url);
        donneesMeteo = await response.json();
        genererTableau();
    } catch (e) {
        document.getElementById('tableau-meteo').innerHTML = `<tr><td colspan="5" class="text-center" style="color:red;">Erreur de chargement.</td></tr>`;
    }
}

function basculerVue() {
    mode3JoursHoraire = !mode3JoursHoraire;
    document.getElementById('btn-vue').innerText = mode3JoursHoraire ? "Passer au mode 7 jours (Toutes les 3h)" : "Passer au mode 3 jours (Heure par heure)";
    genererTableau();
}

function genererTableau() {
    if (!donneesMeteo) return;
    const corps = document.getElementById('tableau-meteo');
    corps.innerHTML = "";

    const h = donneesMeteo.hourly;
    let dernierJour = "";

    if (mode3JoursHoraire) {
        document.getElementById('titre-vue').innerText = "📋 Prévisions sur 3 jours (Heure par heure) - Beauvais";
        const limiteHeures = Math.min(h.time.length, 72);

        for (let idx = 0; idx < limiteHeures; idx++) {
            const dateObj = new Date(h.time[idx]);
            const jourFormate = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            const heureFormatee = dateObj.getHours() + "h";

            if (jourFormate !== dernierJour) {
                dernierJour = jourFormate;
                const ligneJour = document.createElement('tr');
                ligneJour.innerHTML = `<td colspan="5" class="jour-header">${jourFormate.toUpperCase()}</td>`;
                corps.appendChild(ligneJour);
            }

            const mmPluie = h.precipitation[idx];
            const pluieTexte = mmPluie > 0 ? `💧 ${h.precipitation_probability[idx]}% (${mmPluie} mm)` : `💧 ${h.precipitation_probability[idx]}% (0 mm)`;

            const ligne = document.createElement('tr');
            ligne.innerHTML = `
                <td>${heureFormatee}</td>
                <td>${interpreterCodeMeteo(h.weather_code[idx])}</td>
                <td class="text-center">${h.temperature_2m[idx]} °C</td>
                <td class="text-center">${pluieTexte}</td>
                <td class="text-center">🍃 ${h.wind_speed_10m[idx]} km/h</td>
            `;
            corps.appendChild(ligne);
        }
    } else {
        document.getElementById('titre-vue').innerText = "📋 Prévisions sur 7 jours (Tranches de 3 heures) - Beauvais";

        for (let i = 0; i < h.time.length; i += 3) {
            const dateObj = new Date(h.time[i]);
            const jourFormate = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const heureFin = dateObj.getHours() + 3;
            const trancheFormatee = `${dateObj.getHours()}h - ${heureFin === 24 ? 0 : heureFin}h`;

            if (jourFormate !== dernierJour) {
                dernierJour = jourFormate;
                const ligneJour = document.createElement('tr');
                ligneJour.innerHTML = `<td colspan="5" class="jour-header">${jourFormate.toUpperCase()}</td>`;
                corps.appendChild(ligneJour);
            }

            const tSousBloc = h.temperature_2m.slice(i, i + 3);
            const pProbSousBloc = h.precipitation_probability.slice(i, i + 3);
            const pMmSousBloc = h.precipitation.slice(i, i + 3);
            const vSousBloc = h.wind_speed_10m.slice(i, i + 3);
            const codeSousBloc = h.weather_code.slice(i, i + 3);

            const tMoy = (tSousBloc.reduce((a, b) => a + b, 0) / tSousBloc.length).toFixed(1);
            const pProbMax = Math.max(...pProbSousBloc);
            const pMmCumul = pMmSousBloc.reduce((a, b) => a + b, 0).toFixed(1);
            const vMoy = (vSousBloc.reduce((a, b) => a + b, 0) / vSousBloc.length).toFixed(1);
            const codeFrequent = codeSousBloc[0];

            const pluieTexte = pMmCumul > 0 ? `💧 ${pProbMax}% (${pMmCumul} mm)` : `💧 ${pProbMax}% (0 mm)`;

            const ligne = document.createElement('tr');
            ligne.innerHTML = `
                <td>${trancheFormatee}</td>
                <td>${interpreterCodeMeteo(codeFrequent)}</td>
                <td class="text-center">${tMoy} °C</td>
                <td class="text-center">${pluieTexte}</td>
                <td class="text-center">🍃 ${vMoy} km/h</td>
            `;
            corps.appendChild(ligne);
        }
    }
}

demarrer();
</script>

</body>
</html>
